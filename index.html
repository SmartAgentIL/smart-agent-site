<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאסטר בוט - סוכן ביצוע חכם</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg);
            overflow: hidden;
        }

        /* סרגל עליון */
        header {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .status-bar {
            font-size: 0.9em;
            display: flex;
            gap: 15px;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
        }

        /* מבנה מרכזי */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* חלון צ'אט - צד ימין */
        #chat-section {
            width: 350px;
            background: var(--white);
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px;
            border-radius: 10px;
            max-width: 85%;
        }

        .bot { background: #e8f4fd; align-self: flex-start; }
        .user { background: #eee; align-self: flex-end; }

        .chat-input {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 5px;
        }

        input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* חלון תצוגה - צד שמאל */
        #preview-section {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #preview-window {
            flex: 1;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px;
        }

        .placeholder-text {
            color: #999;
            text-align: center;
        }

        /* כפתורי פעולה למטה */
        .actions-footer {
            background: #fff;
            padding: 10px;
            text-align: center;
            border-top: 1px solid #ddd;
        }

        .btn-buy { background: #27ae60; font-weight: bold; padding: 10px 25px; margin: 0 5px; }
        .btn-agent { background: #e67e22; font-weight: bold; padding: 10px 25px; margin: 0 5px; }

    </style>
</head>
<body>

<header>
    <div><strong>מאסטר בוט</strong> - גרסת ביצוע v1.0</div>
    <div class="status-bar">
        <span>סוכן פעיל <span class="dot"></span></span>
        <span>מחובר לענן <span class="dot"></span></span>
    </div>
</header>

<main>
    <section id="chat-section">
        <div id="chat-messages">
            <div class="message bot">שלום! אני מאסטר בוט. איזו תוכנה או אתר תרצה שאבנה לך היום?</div>
            <div class="message bot">אני יכול לבנות, להריץ בענן ולתת לך להתנסות כאן בחלון משמאל בחינם.</div>
        </div>
        <div class="chat-input">
            <input type="text" placeholder="כתוב לי כאן מה לבנות..." id="user-input">
            <button onclick="sendMessage()">שלח</button>
        </div>
    </section>

    <section id="preview-section">
        <div class="preview-header">
            <h3>תצוגה מקדימה (Live Preview)</h3>
            <small>כאן תוכל לראות ולתפעל את מה שאבנה עבורך</small>
        </div>
        <div id="preview-window">
            <div class="placeholder-text" id="loader-text">
                <p>התוכנה שלך תופיע כאן לאחר האפיון בצ'אט...</p>
            </div>
            </div>
    </section>
</main>

<div class="actions-footer">
    <button class="btn-agent">סוכן תיקון מחשב (10 ₪)</button>
    <button class="btn-buy">רכישה וקבלת קוד לצמיתות (90 ₪)</button>
    <button style="background:#8e44ad">מנוי VIP חודשי (150 ₪)</button>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('user-input');
        const msg = input.value;
        if (!msg) return;

        // הוספת הודעת משתמש
        const chat = document.getElementById('chat-messages');
        chat.innerHTML += `<div class="message user">${msg}</div>`;
        input.value = '';

        // דמיית תגובה של הבוט (כאן בהמשך נחבר את ה-API האמיתי)
        setTimeout(() => {
            chat.innerHTML += `<div class="message bot">מבין לגמרי. אני מתחיל לבנות את התשתית בענן. מיד תראה את הסקיצה הראשונית בחלון התצוגה...</div>`;
            chat.scrollTop = chat.scrollHeight;
            
            // דמיית טעינה בחלונית
            document.getElementById('loader-text').innerHTML = "<p>בונה אתר בענן... 15%</p>";
        }, 1000);
    }
</script>

</body>
</html>
