<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>סוכן חכם - בונה אתרים</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #preview-side { flex: 2; background: #fff; border-left: 2px solid #333; }
        #chat-side { flex: 1; display: flex; flex-direction: column; background: #f4f4f9; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        #input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #007bff; color: white; align-self: flex-start; text-align: right; }
        .bot { background: #e2e2e2; color: #333; align-self: flex-end; }
    </style>
</head>
<body>
    <div id="preview-side">
        <iframe id="display-frame" srcdoc="<h2 style='text-align:center; margin-top:20%'>האתר המעוצב שלך יופיע כאן...</h2>"></iframe>
    </div>
    <div id="chat-side">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="user-task" placeholder="מה לבנות לך היום?">
            <button onclick="executeTask()">בצע!</button>
        </div>
    </div>
    <script>
        const BACKEND_URL = 'https://smart-agent-site.onrender.com/chat';
        async function executeTask() {
            const input = document.getElementById('user-task');
            const task = input.value;
            if(!task) return;
            addMessage('אתה: ' + task, 'user');
            input.value = '';
            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: task })
                });
                const data = await response.json();
                if(data.code) {
                    document.getElementById('display-frame').srcdoc = data.code;
                    addMessage('הבוט: האתר מוכן! בדוק את החלונית משמאל.', 'bot');
                }
            } catch (err) {
                addMessage('שגיאה בחיבור לסוכן. וודא שהשרת ב-Render רץ.', 'bot');
            }
        }
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    </script>
</body>
</html>
