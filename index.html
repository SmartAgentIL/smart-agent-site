<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>סוכן AI</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #1a1a1a; color: white; }
        #preview-side { flex: 2; background: #fff; }
        #chat-side { flex: 1; display: flex; flex-direction: column; background: #2d2d2d; min-width: 350px; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #input-area { padding: 15px; border-top: 1px solid #444; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .user { background: #007bff; align-self: flex-start; }
        .bot { background: #444; align-self: flex-end; }
    </style>
</head>
<body>
    <div id="preview-side"><iframe id="display-frame" srcdoc="<h2 style='text-align:center;margin-top:20%'>האתר יופיע כאן</h2>"></iframe></div>
    <div id="chat-side">
        <div id="messages"><div class="msg bot">מה תרצה שאבנה?</div></div>
        <div id="input-area">
            <input type="text" id="user-task" placeholder="כתוב כאן...">
            <button onclick="executeTask()">שלח</button>
        </div>
    </div>
    <script>
        const BACKEND_URL = '/chat';
        async function executeTask() {
            const input = document.getElementById('user-task');
            if(!input.value) return;
            addMessage(input.value, 'user');
            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: input.value })
                });
                const data = await response.json();
                if(data.code) document.getElementById('display-frame').srcdoc = data.code;
            } catch (err) { addMessage('שגיאה בחיבור.', 'bot'); }
            input.value = '';
        }
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
        }
    </script>
</body>
</html>
