<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מאסטר בוט - סוכן בנייה</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #preview-side { flex: 2; background: #eee; position: relative; border-left: 2px solid #333; }
        #chat-side { flex: 1; display: flex; flex-direction: column; background: #fff; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; background: #f4f4f9; }
        #input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user-msg { background: #007bff; color: white; align-self: flex-start; }
        .bot-msg { background: #e2e2e2; color: #333; }
    </style>
</head>
<body>

    <div id="preview-side">
        <iframe id="display-frame" srcdoc="<h2 style='text-align:center; margin-top:20%'>האתר המעוצב שלך יופיע כאן...</h2>"></iframe>
    </div>

    <div id="chat-side">
        <div id="messages">
            <div class="msg bot-msg">שלום! אני הסוכן החכם שלך. איזה אתר תרצה שאבנה לך היום?</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-task" placeholder="למשל: תבנה לי דף נחיתה למעצב פנים...">
            <button onclick="executeTask()">בצע!</button>
        </div>
    </div>

    <script>
        // הכתובת שקיבלת מ-Render
        const BACKEND_URL = 'https://smart-agent-site.onrender.com/chat';

        async function executeTask() {
            const input = document.getElementById('user-task');
            const task = input.value;
            if(!task) return;

            addMessage(task, 'user-msg');
            input.value = '';
            addMessage('מעבד את הבקשה ובונה את הקוד...', 'bot-msg');

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: task })
                });
                
                const data = await response.json();
                if(data.code) {
                    document.getElementById('display-frame').srcdoc = data.code;
                    addMessage('הנה! בניתי את האתר. מה דעתך?', 'bot-msg');
                }
            } catch (err) {
                addMessage('אופס, יש תקלה בחיבור לשרת.', 'bot-msg');
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = 'msg ' + className;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    </script>
</body>
</html>
